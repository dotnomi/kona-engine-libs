name: KoNa Engine Native Libraries Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
#          - target: windows-x64
#            runner: windows-latest
#            triplet: x64-windows-static
#          - target: windows-arm64
#            runner: windows-latest
#            triplet: arm64-windows-static
#          - target: macos-x64
#            runner: macos-latest
#            triplet: x64-osx-static
#          - target: macos-arm64
#            runner: macos-latest
#            triplet: arm64-osx-static
#          - target: linux-x64
#            runner: ubuntu-latest
#            triplet: x64-linux-static
#          - target: linux-arm64
#            runner: ubuntu-latest
#            triplet: arm64-linux-static
          - target: webgl
            runner: ubuntu-latest
            triplet: wasm32-emscripten
            emcc_flags: "-pthread -msimd128"
#          - target: android
#            runner: ubuntu-latest
#            triplet: arm64-android
#          - target: ios
#            runner: macos-latest
#            triplet: arm64-ios

    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
      VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/custom-triplets
      EMCC_CFLAGS: ${{ matrix.emcc_flags || '' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Cache External Sources and Build Cache
        uses: actions/cache@v5
        with:
          path: |
            external
            ~/.vcpkg
            ${{ github.workspace }}/vcpkg/downloads
            ${{ github.workspace }}/vcpkg/installed
          key: native-deps-${{ matrix.target }}-${{ hashFiles('scripts/build-*.cmake', 'custom-triplets/*.cmake') }}
          restore-keys: |
            native-deps-${{ matrix.target }}-

      - name: Install Linux Dependencies (Ubuntu Host)
        if: runner.os == 'Linux' && (matrix.target == 'linux-x64' || matrix.target == 'linux-arm64' || matrix.target == 'webgl' || matrix.target == 'android')
        run: |
          if [ "${{ matrix.target }}" = "linux-arm64" ]; then
            sudo dpkg --add-architecture arm64
            if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
              sudo sed -i '/^URIs: /i Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
            fi
            if [ -f /etc/apt/sources.list ] && [ -s /etc/apt/sources.list ]; then
              sudo sed -i -E 's/^deb (https?:\/\/)/deb [arch=amd64] \1/g' /etc/apt/sources.list
              sudo sed -i -E 's/^deb-src (https?:\/\/)/deb-src [arch=amd64] \1/g' /etc/apt/sources.list
            fi
            CODENAME=$(lsb_release -sc)
            sudo sh -c "echo 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ ${CODENAME} main restricted universe multiverse' > /etc/apt/sources.list.d/arm64-ports.list"
            sudo sh -c "echo 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ ${CODENAME}-updates main restricted universe multiverse' >> /etc/apt/sources.list.d/arm64-ports.list"
            sudo sh -c "echo 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ ${CODENAME}-security main restricted universe multiverse' >> /etc/apt/sources.list.d/arm64-ports.list"
            sudo apt-get update
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu ninja-build
            sudo apt-get install -y libx11-dev:arm64 libxrandr-dev:arm64 libxinerama-dev:arm64 libxcursor-dev:arm64 libxi-dev:arm64 libgl1-mesa-dev:arm64 libglu1-mesa-dev:arm64 libasound2-dev:arm64
          else
            sudo apt-get update
            sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libasound2-dev ninja-build
          fi

      - name: Set up Emscripten (WebGL Target)
        if: matrix.target == 'webgl'
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: 3.1.53
          actions-cache-folder: 'emsdk-cache'

      - name: Set up Android NDK (Android Target)
        if: matrix.target == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Configure Xcode (macOS & iOS Targets)
        if: runner.os == 'macOS'
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -showsdks

#      - name: Run Build SDL2
#        run: cmake -DTARGET_PLATFORM=${{ matrix.target }} -DPREFIX=${{ github.workspace }}/build-out/${{ matrix.target }} -P scripts/build-sdl2.cmake

      - name: Run Build bgfx
        run: cmake -DTARGET_PLATFORM=${{ matrix.target }} -DPREFIX=${{ github.workspace }}/build-out/${{ matrix.target }} -P scripts/build-bgfx.cmake

      - name: Run Build Jolt Physics
        run: cmake -DTARGET_PLATFORM=${{ matrix.target }} -DPREFIX=${{ github.workspace }}/build-out/${{ matrix.target }} -P scripts/build-jolt.cmake

      - name: Run Build Box2D
        run: cmake -DTARGET_PLATFORM=${{ matrix.target }} -DPREFIX=${{ github.workspace }}/build-out/${{ matrix.target }} -P scripts/build-box2d.cmake

      - name: Run Build miniaudio
        run: cmake -DTARGET_PLATFORM=${{ matrix.target }} -DPREFIX=${{ github.workspace }}/build-out/${{ matrix.target }} -P scripts/build-miniaudio.cmake

      - name: Upload Platform Build Output
        uses: actions/upload-artifact@v7
        with:
          name: build-out-${{ matrix.target }}
          path: build-out/${{ matrix.target }}
          retention-days: 1

  package:
    name: Package Artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download All Platform Artifacts
        uses: actions/download-artifact@v8
        with:
          path: build-out

      - name: Run Packaging Script
        run: cmake -P scripts/package-artifacts.cmake

      - name: Publish Manifest to Step Summary
        run: cat nativeLibs/manifest.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Unified nativeLibs.zip
        uses: actions/upload-artifact@v7
        with:
          name: nativeLibs-release
          path: nativeLibs.zip
          retention-days: 7
